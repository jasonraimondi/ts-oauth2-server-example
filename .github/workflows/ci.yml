name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: oauth
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: oauth_example
        ports:
          - 8888:5432
        options: >-
          --health-cmd "pg_isready -U oauth"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # DATABASE_URL is scoped to THIS step only — it must not leak into the test
      # step, where globalSetup reads process.env.DATABASE_URL for the oauth_test db
      # (dotenv won't override an already-set var, so a leaked value breaks setup).
      - run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://oauth:secret@localhost:8888/oauth_example
      - run: pnpm build # tsc --noEmit (type-check)
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --ignore-workspace
      - run: pnpm run check
      - run: pnpm run build
